name: VPN Checker
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # [ВАЖНО] Кэшируем бинарники V2Ray, чтобы не качать их каждый час и не поймать бан от GitHub API
    - name: Cache V2Ray Binaries
      uses: actions/cache@v3
      with:
        path: |
          vendor
          core_engine
        key: v2ray-binaries-${{ runner.os }}-${{ hashFiles('checker.py') }}
        restore-keys: |
          v2ray-binaries-${{ runner.os }}-

    # [ВАЖНО] Устанавливаем библиотеки.
    # Если у вас есть requirements.txt, лучше использовать: pip install -r requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-v2ray

    # Запускаем скрипт. sudo здесь больше не нужен, так как библиотеки установлены в текущего пользователя.
    - name: Run checker script
      run: python checker.py || true

    - name: Run converter script
      run: python converter.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        git add *.txt
        git commit -m "update"
        git push origin main
