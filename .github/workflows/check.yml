name: VPN Checker
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: python main.py
    
    # Исправленный, железобетонный блок отправки данных в GitHub
    - name: Commit and Push changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add cleaned_sub.txt
        
        # Проверяем, есть ли что-либо добавленное в индекс для коммита
        if ! git diff-index --quiet HEAD; then
          git commit -m "Auto-update servers [skip ci]"
          git pull --rebase origin main || true
          git push
        else
          echo "Нет изменений для коммита."
        fi
